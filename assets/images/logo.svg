<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Abo Le">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffdb70"/>
      <stop offset="1" stop-color="#ffb347"/>
    </linearGradient>
  </defs>
  <style>
    .ring { fill: #1e1e21; }
    .tile { fill: url(#g); }
    .mono { fill: #1e1e21; }
    /* light tab bar: minimal black and white icon */
    @media (prefers-color-scheme: light) {
      .tile { fill: #1e1e21; }
      .mono { fill: #ffffff; }
    }
  </style>
  <rect class="ring" width="64" height="64" rx="16"/>
  <rect class="tile" x="5" y="5" width="54" height="54" rx="13"/>
  <text class="mono" x="32" y="33" dy="0.36em" font-family="'Segoe UI', Arial, sans-serif" font-size="25" font-weight="800" text-anchor="middle">AL</text>
</svg>
